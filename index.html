<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freediving Logbook</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #22c55e;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 4px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            color: var(--primary);
        }

        .db-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .db-grid div { margin-bottom: 4px; }

        .btn-group {
            display: flex;
            gap: 8px;               /* 버튼 사이 간격을 살짝 좁혀서 공간 확보 */
            justify-content: space-between;
            width: 100%;
        }

        button {
            flex: 1;                /* 세 버튼이 정확히 1:1:1 비율로 공간을 나눠 가짐 */
            white-space: nowrap;    /* ⚠️ 글자가 절대로 두 줄로 줄바꿈되지 않도록 강제 방지 */
            font-size: 0.85rem;     /* 모바일 화면을 고려해 글자 크기를 살짝 조정 */
            padding: 10px 4px;      /* 좌우 여백을 줄여서 글자가 잘리지 않게 방지 */
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { background-color: var(--primary-hover); }
        button.btn-secondary { background-color: #475569; color: var(--text-color); }
        button.btn-danger { background-color: #ef4444; color: var(--text-color); }
        button.btn-success { background-color: var(--accent); color: #000; width: 100%; margin-top: 10px; font-size: 1rem; padding: 12px;}

        .file-input-wrapper {
            position: relative;
            flex: 1;
            min-width: 120px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }

        .log-item {
            padding: 12px;
            border-radius: 8px;
            background-color: #111827;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-info h3 { font-size: 0.95rem; margin-bottom: 2px; }
        .log-info p { font-size: 0.8rem; color: var(--text-muted); }
        
        .log-actions { display: flex; gap: 6px; }
        .log-actions button { padding: 6px 10px; min-width: auto; font-size: 0.75rem; }

        .form-group {
            margin-bottom: 12px;
            width: 100%;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        /* 💡 모든 모바일 디바이스에서 인풋창 가로 폭이 튀어나오지 않도록 일괄 수정 */
      input[type="text"], input[type="date"], input[type="number"], textarea, input {
        -webkit-appearance: none;       /* ✅ 아이폰 특유의 둥근 버그 및 강제 디자인 삭제 */
        -moz-appearance: none;          /* ✅ 파이어폭스 기본 디자인 삭제 */
        appearance: none;               /* ✅ 표준 브라우저 기본 디자인 삭제 */
        width: 100% !important;
        box-sizing: border-box !important;
        max-width: 100% !important;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background-color: #0f172a;
        color: var(--text-color);
        font-size: 0.9rem;
        display: block;                 /* ✅ 한 줄을 통째로 차지하도록 강제 정렬 */
}
        

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 6px;
        }
        .check-label {
            display: flex;
            align-items: center;
            background-color: #0f172a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .check-label input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
        }

        .session-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center;
        }
        .session-row span { min-width: 40px; font-size: 0.85rem; color: var(--text-muted); }
        .session-row input { flex: 1; padding: 8px; font-size: 0.85rem; }

        .grid-textarea {
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #111827;
            color: #e2e8f0;
            line-height: 20px;
        }

        .hidden { display: none !important; }
        .empty-msg { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 20px 0; }
    </style>
</head>
<body>

    <header>
        <h1>Free Diving Logbook 🤿</h1>
        <p>스마트 다이빙 로그</p>
    </header>

    <div class="card">
        <h2>다이빙 대시보드</h2>
        <div class="db-grid">
            <div id="stat-count">총 다이빙 횟수: 0회</div>
            <div id="stat-pb">최대 수심 (PB): 0m</div>
        </div>
        <div class="btn-group">
            <button id="btn-add-log" onclick="openForm()">새 로그 추가</button>
            <button class="btn-secondary" onclick="exportData()">백업 내보내기</button>
            <div class="file-input-wrapper">
                <button class="btn-secondary" style="width:100%">가져오기</button>
                <input type="file" id="import-file" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div class="card" id="log-list-card">
        <h2>로그 데이터베이스</h2>
        <div id="log-list-container">
            </div>
    </div>

    <div class="card hidden" id="log-form-card">
        <h2 id="form-title">새 다이빙 기록 작성</h2>
        <form id="dive-form" onsubmit="saveLog(event)">
            <input type="hidden" id="edit-index">

            <div class="form-group">
                <label>세션 제목 / 메모 명칭</label>
                <input type="text" id="form-title-input" placeholder="예: 안성 잠수풀 정기 트레이닝" required>
            </div>
            <div class="form-group">
                <label>날짜</label>
                <input type="date" id="form-date-input" required>
            </div>
            <div class="form-group">
                <label>세션 No.</label>
                <input type="number" id="form-session-no" placeholder="숫자 입력">
            </div>
            <div class="form-group">
                <label>장소 (Location)</label>
                <input type="text" id="form-location" placeholder="K26, 용인 잠수풀 등">
            </div>
            <div class="form-group">
                <label>다이브 버디 (Buddy)</label>
                <input type="text" id="form-buddy" placeholder="버디 이름을 입력하세요">
            </div>
            <div class="form-group">
                <label>담당 강사 (Instructor)</label>
                <input type="text" id="form-instructor" placeholder="강사 이름을 입력하세요">
            </div>
            <hr style="border-color:var(--border); margin:16px 0;">

            <div class="form-group">
                <label>EQUIPMENT CHECK (장비)</label>
                <div class="checkbox-grid">
                    <label class="check-label"><input type="checkbox" id="eq-mask">Mask</label>
                    <label class="check-label"><input type="checkbox" id="eq-snorkel">Snorkel</label>
                    <label class="check-label"><input type="checkbox" id="eq-fins">Fins</label>
                    <label class="check-label"><input type="checkbox" id="eq-gloves">Gloves</label>
                    <label class="check-label"><input type="checkbox" id="eq-socks">Socks</label>
                    <label class="check-label"><input type="checkbox" id="eq-lanyard">Lanyard</label>
                </div>
                <div style="display:flex; gap:6px; margin-top:8px;">
                    <input type="text" id="eq-wetsuit" placeholder="슈트 두께 (mm)" style="flex:1;">
                    <input type="text" id="eq-weight" placeholder="웨이트 (Neck/Belt kg)" style="flex:1;">
                </div>
                <div style="margin-top: 10px;">
                    <input type="text" id="eq-etc" placeholder="기타 장비 (etc) - 자유롭게 적어주세요">
                </div>
            </div>

            <div class="form-group">
                <label>CONDITIONS (환경)</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
                    <input type="text" id="cond-weather" placeholder="날씨">
                    <input type="text" id="cond-surface" placeholder="파도">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                    <input type="text" id="cond-current" placeholder="조류">
                    <input type="text" id="cond-temp" placeholder="수온/기온">
                </div>
            </div>

            <div class="form-group">
                <label>PURPOSE (목적 및 종목)</label>
                <div class="checkbox-grid">
                    <label class="check-label"><input type="checkbox" id="p-sta">STA</label>
                    <label class="check-label"><input type="checkbox" id="p-dyn">DYN</label>
                    <label class="check-label"><input type="checkbox" id="p-dnf">DNF</label>
                    <label class="check-label"><input type="checkbox" id="p-cwt">CWT</label>
                    <label class="check-label"><input type="checkbox" id="p-cnf">CNF</label>
                    <label class="check-label"><input type="checkbox" id="p-fim">FIM</label>
                </div>
            </div>

            <hr style="border-color:var(--border); margin:16px 0;">

            <div class="form-group">
                <label>SESSION DIVE LOG (웜업 3회)</label>
                <input type="text" id="warmup-type" placeholder="종목을 넣어주세요 (예: STA, DYN)">
                
                <div style="height: 15px;"></div>
                
                <div id="warmup-inputs">
                    </div>
            </div>

            <div style="height: 40px;"></div>

            <div class="form-group">
                <label>SESSION DIVE LOG (본 다이빙 최대 8회)</label>
                <input type="text" id="main-type" placeholder="종목을 넣어주세요 (예: CWT, FIM)">
                
                <div style="height: 15px;"></div>
                
                <div id="main-inputs" style="max-height: 260px; overflow-y: auto; padding-right:4px;">
                    </div>
            </div>

            <div class="form-group">
                <label>COMMENT (종합 피드백 모눈)</label>
                <textarea id="form-comment" rows="6" class="grid-textarea" placeholder="이퀄라이징 컨디션이나 자세 교정 내용을 적어보세요..."></textarea>
            </div>

            <div class="btn-group" style="margin-top:16px;">
                <button type="submit" class="btn-success">로그 저장하기</button>
                <button type="button" class="btn-secondary" onclick="closeForm()" style="width:100%; margin-top:6px; padding:12px; font-size:1rem;">취소</button>
            </div>
        </form>
    </div>

    <script>
        let db = [];

        // 초기 인풋 창 바인딩 및 동적 생성
        function initFormFields() {
            const wuContainer = document.getElementById('warmup-inputs');
            wuContainer.innerHTML = '';
            for(let i=1; i<=3; i++) {
                wuContainer.innerHTML += `
                    <div class="session-row">
                        <span>WU ${i}</span>
                        <input type="number" step="0.1" id="wu-d-${i}" placeholder="수심(m)">
                        <input type="text" id="wu-t-${i}" placeholder="시간">
                    </div>`;
            }

            const mainContainer = document.getElementById('main-inputs');
            mainContainer.innerHTML = '';
            for(let i=1; i<=8; i++) {
                mainContainer.innerHTML += `
                    <div class="session-row">
                        <span># ${i}</span>
                        <input type="number" step="0.1" id="main-d-${i}" placeholder="수심(m)" class="main-depth-input">
                        <input type="text" id="main-t-${i}" placeholder="시간">
                    </div>`;
            }
        }

        // 데이터 로드 및 갱신
        function render() {
            const data = localStorage.getItem('freediving_db');
            db = data ? JSON.parse(data) : [];
            
            // 통계 업뎃
            document.getElementById('stat-count').innerText = `총 다이빙 횟수: ${db.length}회`;
            let maxPb = 0;
            db.forEach(log => {
                if(log.mainDives) {
                    log.mainDives.forEach(d => { if(Number(d.depth) > maxPb) maxPb = Number(d.depth); });
                }
            });
            document.getElementById('stat-pb').innerText = `최대 수심 (PB): ${maxPb}m`;

            // 목록 렌더링
            const container = document.getElementById('log-list-container');
            container.innerHTML = '';

            if(db.length === 0) {
                container.innerHTML = '<div class="empty-msg">아직 등록된 다이빙 로그가 없습니다.</div>';
                return;
            }

            db.forEach((log, index) => {
                let tags = [];
                if(log.purpose) { for(let key in log.purpose) { if(log.purpose[key]) tags.push(key.toUpperCase()); } }
                
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div class="log-info" onclick="editLog(${index})">
                        <h3>No.${log.sessionNo || (index+1)} ${log.title}</h3>
                        <p>${log.date} | ${log.location || '장소 미지정'} | 버디: ${log.buddy || '없음'}</p>
                        <p style="color:var(--primary); font-size:0.75rem; margin-top:2px;">${tags.join(', ') || '종목 선택없음'}</p>
                    </div>
                    <div class="log-actions">
                        <button class="btn-secondary" onclick="editLog(${index})">수정</button>
                        <button class="btn-danger" onclick="deleteLog(${index}, event)">삭제</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openForm() {
            document.getElementById('dive-form').reset();
            document.getElementById('edit-index').value = '';
            document.getElementById('form-title').innerText = '새 다이빙 기록 작성';
            
            // 오늘 날짜 기본 지정
            document.getElementById('form-date-input').value = new Date().toISOString().substring(0, 10);
            
            document.getElementById('log-form-card').classList.remove('hidden');
            document.getElementById('log-list-card').classList.add('hidden');
            window.scrollTo({ top: document.getElementById('log-form-card').offsetTop - 20, behavior: 'smooth' });
        }

        function closeForm() {
            document.getElementById('log-form-card').classList.add('hidden');
            document.getElementById('log-list-card').classList.remove('hidden');
        }

        function saveLog(e) {
            e.preventDefault();
            const index = document.getElementById('edit-index').value;

            // 데이터 수집 객체 빌드 (새 항목인 instructor 및 eqEtc 자바스크립트 매핑 완료)
            const logData = {
                title: document.getElementById('form-title-input').value,
                date: document.getElementById('form-date-input').value,
                sessionNo: document.getElementById('form-session-no').value,
                location: document.getElementById('form-location').value,
                buddy: document.getElementById('form-buddy').value,
                instructor: document.getElementById('form-instructor').value,
                equipment: {
                    mask: document.getElementById('eq-mask').checked,
                    snorkel: document.getElementById('eq-snorkel').checked,
                    fins: document.getElementById('eq-fins').checked,
                    gloves: document.getElementById('eq-gloves').checked,
                    socks: document.getElementById('eq-socks').checked,
                    lanyard: document.getElementById('eq-lanyard').checked,
                    wetsuit: document.getElementById('eq-wetsuit').value,
                    weight: document.getElementById('eq-weight').value,
                    etc: document.getElementById('eq-etc').value
                },
                conditions: {
                    weather: document.getElementById('cond-weather').value,
                    surface: document.getElementById('cond-surface').value,
                    current: document.getElementById('cond-current').value,
                    temp: document.getElementById('cond-temp').value
                },
                purpose: {
                    sta: document.getElementById('p-sta').checked,
                    dyn: document.getElementById('p-dyn').checked,
                    dnf: document.getElementById('p-dnf').checked,
                    cwt: document.getElementById('p-cwt').checked,
                    cnf: document.getElementById('p-cnf').checked,
                    fim: document.getElementById('p-fim').checked
                },
                warmupType: document.getElementById('warmup-type').value,
                mainType: document.getElementById('main-type').value,
                warmups: [],
                mainDives: [],
                comment: document.getElementById('form-comment').value
            };

            for(let i=1; i<=3; i++) {
                logData.warmups.push({
                    depth: document.getElementById(`wu-d-${i}`).value,
                    time: document.getElementById(`wu-t-${i}`).value
                });
            }
            for(let i=1; i<=8; i++) {
                logData.mainDives.push({
                    depth: document.getElementById(`main-d-${i}`).value,
                    time: document.getElementById(`main-t-${i}`).value
                });
            }

            if(index === "") {
                db.push(logData);
            } else {
                db[index] = logData;
            }

            localStorage.setItem('freediving_db', JSON.stringify(db));
            closeForm();
            render();
        }

        function editLog(index) {
            openForm();
            document.getElementById('edit-index').value = index;
            document.getElementById('form-title').innerText = `로그 수정 (No. ${db[index].sessionNo || index+1})`;

            const log = db[index];
            document.getElementById('form-title-input').value = log.title || '';
            document.getElementById('form-date-input').value = log.date || '';
            document.getElementById('form-session-no').value = log.sessionNo || '';
            document.getElementById('form-location').value = log.location || '';
            document.getElementById('form-buddy').value = log.buddy || '';
            document.getElementById('form-instructor').value = log.instructor || '';

            if(log.equipment) {
                document.getElementById('eq-mask').checked = !!log.equipment.mask;
                document.getElementById('eq-snorkel').checked = !!log.equipment.snorkel;
                document.getElementById('eq-fins').checked = !!log.equipment.fins;
                document.getElementById('eq-gloves').checked = !!log.equipment.gloves;
                document.getElementById('eq-socks').checked = !!log.equipment.socks;
                document.getElementById('eq-lanyard').checked = !!log.equipment.lanyard;
                document.getElementById('eq-wetsuit').value = log.equipment.wetsuit || '';
                document.getElementById('eq-weight').value = log.equipment.weight || '';
                document.getElementById('eq-etc').value = log.equipment.etc || '';
            }

            if(log.conditions) {
                document.getElementById('cond-weather').value = log.conditions.weather || '';
                document.getElementById('cond-surface').value = log.conditions.surface || '';
                document.getElementById('cond-current').value = log.conditions.current || '';
                document.getElementById('cond-temp').value = log.conditions.temp || '';
            }

            if(log.purpose) {
                document.getElementById('p-sta').checked = !!log.purpose.sta;
                document.getElementById('p-dyn').checked = !!log.purpose.dyn;
                document.getElementById('p-dnf').checked = !!log.purpose.dnf;
                document.getElementById('p-cwt').checked = !!log.purpose.cwt;
                document.getElementById('p-cnf').checked = !!log.purpose.cnf;
                document.getElementById('p-fim').checked = !!log.purpose.fim;
            }

            document.getElementById('warmup-type').value = log.warmupType || '';
            document.getElementById('main-type').value = log.mainType || '';

            if(log.warmups) {
                log.warmups.forEach((wu, i) => {
                    if(i < 3) {
                        document.getElementById(`wu-d-${i+1}`).value = wu.depth || '';
                        document.getElementById(`wu-t-${i+1}`).value = wu.time || '';
                    }
                });
            }

            if(log.mainDives) {
                log.mainDives.forEach((md, i) => {
                    if(i < 8) {
                        document.getElementById(`main-d-${i+1}`).value = md.depth || '';
                        document.getElementById(`main-t-${i+1}`).value = md.time || '';
                    }
                });
            }

            document.getElementById('form-comment').value = log.comment || '';
        }

        function deleteLog(index, event) {
            event.stopPropagation();
            if(confirm("이 로그 기록을 삭제하시겠습니까?")) {
                db.splice(index, 1);
                localStorage.setItem('freediving_db', JSON.stringify(db));
                render();
            }
        }

        function exportData() {
            if(db.length === 0) return alert("내보낼 로그 데이터가 없습니다.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `freediving_logs_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        if(confirm(`총 ${imported.length}개의 로그를 가져와 병합하시겠습니까?`)) {
                            const merged = [...db, ...imported];
                            localStorage.setItem('freediving_db', JSON.stringify(merged));
                            render();
                        }
                    } else { alert("유효한 로그북 파일 형식이 아닙니다."); }
                } catch(err) { alert("파일 읽기 오류가 발생했습니다."); }
            };
            reader.readAsText(file);
        }

        window.onload = function() {
            initFormFields();
            render();
        };
    </script>
</body>
</html>
