<!DOCTYPE html><html lang="ko">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freediving Logbook</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #22c55e;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 4px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            color: var(--primary);
        }

        .db-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            width: 100%;
        }

        button, .file-input-wrapper button {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            flex: 1;
            width: 100%;
            white-space: nowrap;
            font-size: 0.85rem;
            padding: 10px 4px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none !important;
            border-radius: 20px !important;
            cursor: pointer;
            background-color: var(--primary) !important;
            color: #000 !important;
            font-weight: 600;
        }

        button.btn-secondary, .file-input-wrapper button {
            background-color: #475569 !important;
            color: var(--text-color) !important;
        }

        button.btn-danger { background-color: #ef4444 !important; color: var(--text-color) !important; }
        button.btn-success { background-color: var(--accent) !important; color: #000 !important; width: 100%; margin-top: 10px; font-size: 1rem; padding: 12px;}

        .file-input-wrapper {
            position: relative;
            flex: 1;
            min-width: 120px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }

        .log-item {
            padding: 12px;
            border-radius: 8px;
            background-color: #111827;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .log-info { flex: 1; min-width: 0; cursor: pointer; }
        .log-info h3 { font-size: 0.95rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .log-info p { font-size: 0.8rem; color: var(--text-muted); }
        
        .log-comment-preview {
            margin-top: 8px;
            padding: 10px;
            background-color: #0f172a;
            border-radius: 6px;
            font-size: 0.85rem !important;
            color: #94a3b8 !important;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.5;
            border-left: 4px solid var(--primary);
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .log-actions { display: flex; gap: 6px; flex-shrink: 0; }
        
        .form-group { margin-bottom: 12px; width: 100%; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        
        input[type="text"], input[type="date"], input[type="number"], textarea {
            -webkit-appearance: none;
            width: 100% !important;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: #0f172a;
            color: var(--text-color);
            font-size: 0.9rem;
            display: block;
        }
        
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 6px;
        }

        .check-label {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            background-color: #0f172a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
        }

        .check-label input[type="checkbox"] {
            -webkit-appearance: checkbox !important;
            width: 18px !important;
            height: 18px !important;
            margin: 0 !important;
        }

        .session-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
        .session-row span { min-width: 40px; font-size: 0.85rem; color: var(--text-muted); }
        .session-row input { flex: 1; padding: 8px; font-size: 0.85rem; }

        .grid-textarea {
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
            background-color: #111827;
            color: #e2e8f0;
            line-height: 24px !important;
            padding: 14px !important;
            font-size: 0.95rem !important;
            resize: none;
            background-attachment: local;
            flex: 1;
            margin-bottom: 12px;
        }

        .comment-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color); z-index: 2000;
            display: flex; flex-direction: column; padding: 16px;
        }
        .comment-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-info-preview { background-color: #111827; border: 1px dashed var(--border); border-radius: 8px; padding: 10px; margin-bottom: 14px; font-size: 0.85rem; color: var(--text-muted); }
        
        .modal-footer-btn {
            flex: none !important;
            width: 100% !important;
            height: 50px !important;
            font-size: 1rem !important;
            padding: 12px !important;
            border-radius: 25px !important;
        }

        .hidden { display: none !important; }
        .close-modal-btn { background: none !important; color: var(--text-muted) !important; width: auto !important; font-size: 1.2rem; padding: 4px 8px; }
    </style></head><body>

    <header>
        <h1>Free Diving Logbook 🤿</h1>
    </header>

    <div class="card">
        <h2>다이빙 대시보드</h2>
        <div class="db-grid">
            <div id="stat-count">총 다이빙 횟수: 0회</div>
            <div id="stat-pb">최대 수심 (PB): 0m</div>
        </div>
        <div class="btn-group">
            <button id="btn-add-log" onclick="openForm()">새 로그 추가</button>
            <button class="btn-secondary" onclick="exportData()">백업 내보내기</button>
            <div class="file-input-wrapper">
                <button class="btn-secondary" style="width:100%">가져오기</button>
                <input type="file" id="import-file" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div class="card" id="log-list-card">
        <h2>로그 데이터베이스</h2>
        <div id="log-list-container"></div>
    </div>

    <div class="card hidden" id="log-form-card">
        <h2 id="form-title">기록 작성</h2>
        <form id="dive-form" onsubmit="saveLog(event)">
            <input type="hidden" id="edit-index">
            <div class="form-group"><label>세션 제목</label><input type="text" id="form-title-input" placeholder="예: 안성 잠수풀 정기 트레이닝" required></div>
            <div class="form-group"><label>날짜</label><input type="date" id="form-date-input" required></div>
            <div class="form-group"><label>세션 No.</label><input type="number" id="form-session-no" placeholder="숫자 입력"></div>
            <div class="form-group"><label>장소</label><input type="text" id="form-location" placeholder="K26, 용인 잠수풀 등"></div>
            <div class="form-group"><label>버디</label><input type="text" id="form-buddy" placeholder="버디 이름을 입력하세요"></div>
            <div class="form-group"><label>강사</label><input type="text" id="form-instructor" placeholder="강사 이름을 입력하세요"></div>
            <div class="form-group">
                <label>장비</label>
                <div class="checkbox-grid">
                    <label class="check-label"><input type="checkbox" id="eq-mask">Mask</label>
                    <label class="check-label"><input type="checkbox" id="eq-snorkel">Snorkel</label>
                    <label class="check-label"><input type="checkbox" id="eq-fins">Fins</label>
                    <label class="check-label"><input type="checkbox" id="eq-gloves">Gloves</label>
                    <label class="check-label"><input type="checkbox" id="eq-socks">Socks</label>
                    <label class="check-label"><input type="checkbox" id="eq-lanyard">Lanyard</label>
                    <label class="check-label"><input type="checkbox" id="eq-watch">Watch</label>
                </div>
                <div style="display:flex; gap:6px; margin-top:8px;">
                    <input type="text" id="eq-wetsuit" placeholder="슈트(mm)" style="flex:1;">
                    <input type="text" id="eq-weight" placeholder="웨이트(kg)" style="flex:1;">
                </div>
                <div style="margin-top: 10px;"><input type="text" id="eq-etc" placeholder="기타 장비"></div>
            </div>
            <div class="form-group">
                <label>환경</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
                    <input type="text" id="cond-weather" placeholder="날씨">
                    <input type="text" id="cond-surface" placeholder="파도">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                    <input type="text" id="cond-current" placeholder="조류">
                    <input type="text" id="cond-temp" placeholder="수온/기온">
                </div>
            </div>

            <div class="form-group">
                <label>목적</label>
                <div class="checkbox-grid">
                    <label class="check-label"><input type="checkbox" id="p-sta">STA</label>
                    <label class="check-label"><input type="checkbox" id="p-dyn">DYN</label>
                    <label class="check-label"><input type="checkbox" id="p-dnf">DNF</label>
                    <label class="check-label"><input type="checkbox" id="p-cwt">CWT</label>
                    <label class="check-label"><input type="checkbox" id="p-cnf">CNF</label>
                    <label class="check-label"><input type="checkbox" id="p-fim">FIM</label>
                </div>
            </div>

            <div class="form-group"><label>웜업 세션 타입 (예: FIM)</label><input type="text" id="warmup-type"></div>
            <div class="form-group"><label>웜업 세션 기록</label><div id="warmup-inputs"></div></div>
            
            <div class="form-group"><label>본 다이빙 세션 타입 (예: CWT)</label><input type="text" id="main-type"></div>
            <div class="form-group"><label>본 다이빙 세션 기록</label><div id="main-inputs"></div></div>
            
            <div class="form-group"><label>COMMENT</label><button type="button" class="btn-secondary" onclick="openCommentModal()">📝 모눈노트 열기</button></div>

            <button type="submit" class="btn-success">로그 저장하기</button>
            <button type="button" class="btn-secondary" style="width:100%; margin-top:10px;" onclick="closeForm()">취소</button>
        </form>
    </div>

    <div id="comment-modal-window" class="comment-modal hidden">
        <div class="comment-modal-header"><h2 id="comment-modal-title">피드백 작성</h2><button class="close-modal-btn" onclick="closeCommentModal()">✕</button></div>
        <div class="modal-info-preview" id="modal-info-preview-box"></div>
        <textarea id="form-comment" class="grid-textarea" placeholder="여기에 세션 피드백을 기록하세요..."></textarea>
        <button type="button" class="btn-success modal-footer-btn" onclick="closeCommentModal()">작성 완료</button>
    </div>

    <script>
        let db = [];
        
        function initFormFields() {
            const wu = document.getElementById('warmup-inputs'), main = document.getElementById('main-inputs');
            wu.innerHTML = ''; main.innerHTML = '';
            for(let i=1; i<=3; i++) wu.innerHTML += `<div class="session-row"><span>WU ${i}</span><input type="number" step="0.1" id="wu-d-${i}" placeholder="수심(m)"><input type="text" id="wu-t-${i}" placeholder="시간"></div>`;
            for(let i=1; i<=8; i++) main.innerHTML += `<div class="session-row"><span># ${i}</span><input type="number" step="0.1" id="main-d-${i}" placeholder="수심(m)"><input type="text" id="main-t-${i}" placeholder="시간"></div>`;
        }

        function calculateStats() {
            document.getElementById('stat-count').innerText = `총 다이빙 횟수: ${db.length}회`;
            
            let maxDepth = 0;
            db.forEach(log => {
                if (log.warmups) {
                    log.warmups.forEach(w => { if(Number(w.depth) > maxDepth) maxDepth = Number(w.depth); });
                }
                if (log.mainDives) {
                    log.mainDives.forEach(m => { if(Number(m.depth) > maxDepth) maxDepth = Number(m.depth); });
                }
            });
            document.getElementById('stat-pb').innerText = `최대 수심 (PB): ${maxDepth.toFixed(1)}m`;
        }

        function render() {
            const data = localStorage.getItem('freediving_db');
            db = data ? JSON.parse(data) : [];
            const container = document.getElementById('log-list-container');
            container.innerHTML = '';
            
            db.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div class="log-info" onclick="editLog(${index})">
                        <h3>No.${log.sessionNo || (index+1)} ${log.title}</h3>
                        <p>${log.date} | ${log.location || '장소 미지정'}</p>
                        <div class="log-comment-preview" onclick="openDirectComment(${index}, event)">${log.comment ? log.comment.replace(/\n/g, '<br>') : '+ 피드백 추가...'}</div>
                    </div>
                    <div class="log-actions">
                        <button onclick="editLog(${index})">수정</button>
                        <button class="btn-danger" onclick="deleteLog(${index}, event)">삭제</button>
                    </div>
                `;
                container.appendChild(div);
            });
            calculateStats();
        }

        function openDirectComment(idx, e) { 
            e.stopPropagation(); 
            editLog(idx); 
            openCommentModal(); 
        }
        
        function openCommentModal() {
            document.getElementById('comment-modal-window').classList.remove('hidden');
            document.getElementById('modal-info-preview-box').innerHTML = `<div>📌 <strong>${document.getElementById('form-title-input').value || '제목 없음'}</strong></div>`;
        }
        
        function closeCommentModal() { 
            document.getElementById('comment-modal-window').classList.add('hidden'); 
        }
        
        function openForm() { 
            document.getElementById('dive-form').reset();
            initFormFields();
            document.getElementById('edit-index').value = "";
            document.getElementById('form-title').innerText = "새 로그 작성";
            document.getElementById('log-form-card').classList.remove('hidden'); 
            document.getElementById('log-list-card').classList.add('hidden'); 
        }
        
        function closeForm() { 
            document.getElementById('log-form-card').classList.add('hidden'); 
            document.getElementById('log-list-card').classList.remove('hidden'); 
        }
        
        function saveLog(e) {
            e.preventDefault();
            const idx = document.getElementById('edit-index').value;
            const logData = {
                title: document.getElementById('form-title-input').value, 
                date: document.getElementById('form-date-input').value,
                sessionNo: document.getElementById('form-session-no').value, 
                location: document.getElementById('form-location').value,
                buddy: document.getElementById('form-buddy').value, 
                instructor: document.getElementById('form-instructor').value,
                // [수정] CONDITIONS 데이터 추출 및 바인딩 로직 보완
                conditions: {
                    weather: document.getElementById('cond-weather').value,
                    surface: document.getElementById('cond-surface').value,
                    current: document.getElementById('cond-current').value,
                    temp: document.getElementById('cond-temp').value
                },
                equipment: { 
                    mask: document.getElementById('eq-mask').checked, 
                    snorkel: document.getElementById('eq-snorkel').checked, 
                    fins: document.getElementById('eq-fins').checked, 
                    gloves: document.getElementById('eq-gloves').checked, 
                    socks: document.getElementById('eq-socks').checked, 
                    lanyard: document.getElementById('eq-lanyard').checked, 
                    watch: document.getElementById('eq-watch').checked, 
                    wetsuit: document.getElementById('eq-wetsuit').value, 
                    weight: document.getElementById('eq-weight').value, 
                    etc: document.getElementById('eq-etc').value 
                },
                purpose: { 
                    sta: document.getElementById('p-sta').checked, 
                    dyn: document.getElementById('p-dyn').checked, 
                    dnf: document.getElementById('p-dnf').checked, 
                    cwt: document.getElementById('p-cwt').checked, 
                    cnf: document.getElementById('p-cnf').checked, 
                    fim: document.getElementById('p-fim').checked 
                },
                warmupType: document.getElementById('warmup-type').value,
                mainType: document.getElementById('main-type').value,
                warmups: Array.from({length:3}, (_,i)=>({depth: document.getElementById(`wu-d-${i+1}`).value, time: document.getElementById(`wu-t-${i+1}`).value})),
                mainDives: Array.from({length:8}, (_,i)=>({depth: document.getElementById(`main-d-${i+1}`).value, time: document.getElementById(`main-t-${i+1}`).value})),
                comment: document.getElementById('form-comment').value
            };
            
            if(idx === "") {
                db.push(logData); 
            } else {
                db[idx] = logData;
            }
            
            localStorage.setItem('freediving_db', JSON.stringify(db));
            closeForm(); 
            render();
        }

        function editLog(idx) {
            document.getElementById('log-form-card').classList.remove('hidden'); 
            document.getElementById('log-list-card').classList.add('hidden');
            document.getElementById('form-title').innerText = "로그 데이터 수정";
            document.getElementById('edit-index').value = idx;
            
            const log = db[idx];
            
            document.getElementById('form-title-input').value = log.title || ''; 
            document.getElementById('form-date-input').value = log.date || '';
            document.getElementById('form-session-no').value = log.sessionNo || '';
            document.getElementById('form-location').value = log.location || '';
            document.getElementById('form-buddy').value = log.buddy || '';
            document.getElementById('form-instructor').value = log.instructor || '';
            document.getElementById('form-comment').value = log.comment || '';
            document.getElementById('warmup-type').value = log.warmupType || '';
            document.getElementById('main-type').value = log.mainType || '';

            // [수정] CONDITIONS 데이터 수정 시 인풋 폼으로 복원 로직 추가
            if (log.conditions) {
                document.getElementById('cond-weather').value = log.conditions.weather || '';
                document.getElementById('cond-surface').value = log.conditions.surface || '';
                document.getElementById('cond-current').value = log.conditions.current || '';
                document.getElementById('cond-temp').value = log.conditions.temp || '';
            } else {
                document.getElementById('cond-weather').value = '';
                document.getElementById('cond-surface').value = '';
                document.getElementById('cond-current').value = '';
                document.getElementById('cond-temp').value = '';
            }

            if (log.equipment) {
                document.getElementById('eq-mask').checked = !!log.equipment.mask;
                document.getElementById('eq-snorkel').checked = !!log.equipment.snorkel;
                document.getElementById('eq-fins').checked = !!log.equipment.fins;
                document.getElementById('eq-gloves').checked = !!log.equipment.gloves;
                document.getElementById('eq-socks').checked = !!log.equipment.socks;
                document.getElementById('eq-lanyard').checked = !!log.equipment.lanyard;
                document.getElementById('eq-watch').checked = !!log.equipment.watch;
                document.getElementById('eq-wetsuit').value = log.equipment.wetsuit || '';
                document.getElementById('eq-weight').value = log.equipment.weight || '';
                document.getElementById('eq-etc').value = log.equipment.etc || '';
            }

            if (log.purpose) {
                document.getElementById('p-sta').checked = !!log.purpose.sta;
                document.getElementById('p-dyn').checked = !!log.purpose.dyn;
                document.getElementById('p-dnf').checked = !!log.purpose.dnf;
                document.getElementById('p-cwt').checked = !!log.purpose.cwt;
                document.getElementById('p-cnf').checked = !!log.purpose.cnf;
                document.getElementById('p-fim').checked = !!log.purpose.fim;
            }

            initFormFields();
            if (log.warmups) {
                log.warmups.forEach((w, i) => {
                    if(i < 3) {
                        document.getElementById(`wu-d-${i+1}`).value = w.depth || '';
                        document.getElementById(`wu-t-${i+1}`).value = w.time || '';
                    }
                });
            }
            if (log.mainDives) {
                log.mainDives.forEach((m, i) => {
                    if(i < 8) {
                        document.getElementById(`main-d-${i+1}`).value = m.depth || '';
                        document.getElementById(`main-t-${i+1}`).value = m.time || '';
                    }
                });
            }
        }

        function deleteLog(idx, e) {
            e.stopPropagation();
            if (confirm("정말로 이 로그를 삭제하시겠습니까?")) {
                db.splice(idx, 1);
                localStorage.setItem('freediving_db', JSON.stringify(db));
                render();
            }
        }

        function exportData() {
            if (db.length === 0) {
                alert("백업할 데이터가 없습니다.");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `freediving_logs_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        const mode = confirm("기존 기록을 유지하면서 추가하시려면 [확인]을, 기존 기록을 완전히 지우고 파일 데이터로 바꾸시려면 [취소]를 누르세요.");
                        if (mode) {
                            db = db.concat(importedData);
                        } else {
                            db = importedData;
                        }
                        localStorage.setItem('freediving_db', JSON.stringify(db));
                        alert("데이터를 성공적으로 반영했습니다!");
                        render();
                    } else {
                        alert("올바른 JSON 데이터 형식이 아닙니다. 로그 배열 파일이어야 합니다.");
                    }
                } catch (error) {
                    alert("파일을 읽는 중 오류가 발생했습니다. 올바른 json 백업본인지 확인해 주세요.");
                    console.error(error);
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        window.onload = () => { 
            initFormFields(); 
            render(); 
        };
    </script>
</body>
</html>
